project_name: pomogo
version: 2

builds:
  - id: pomogo
    main: ./cmd/pomogo
    binary: pomogo
    
    # Inject version at build time
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
    
    # Build for Linux only (Wayland-first design)
    goos:
      - linux
      - darwin
    
    goarch:
      - amd64
      - arm64
    
    # CGo-free: no dependencies on system libraries
    env:
      - CGO_ENABLED=0

archives:
  - id: pomogo-archive
    ids:
      - pomogo
    formats:
      - tar.gz
    
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}
    
    # Include contrib files in archive
    files:
      - src: contrib/
        dst: contrib/
      - src: README.md
        dst: README.md
      - src: LICENSE
        dst: LICENSE
    
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}-{{ .Version }}-checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge"

release:
  footer: |
    ## TUI key bindings

    | Key | Action |
    |---|---|
    | `s` | Start the current focus session |
    | `space` | Pause / resume a running timer |
    | `n` | Skip current segment |
    | `t` | Edit task description |
    | `p` | Edit project category |
    | `d` | Choose a Deep Focus duration before starting |
    | `tab` | Toggle statistics screen |
    | `y` | Copy stats summary to clipboard |
    | `T` | Cycle theme |
    | `L` | Cycle layout |
    | `a` | Choose sound profile |
    | `S` | Toggle Zen / Screenshot mode |
    | `e` | Cycle ambient background effects |
    | `v` | Cycle task verb labels |
    | `r` | Reset session |
    | `esc` | Back / close overlay |
    | `?` | Show help menu |
    | `q`, `ctrl+c` | Quit |

# No publishing configured yet (use: goreleaser release --snapshot --clean)
