project_name: pomogo
version: 2

builds:
  - id: pomogo
    main: ./cmd/pomogo
    binary: pomogo
    
    # Inject version at build time
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
    
    # Build for Linux only (Wayland-first design)
    goos:
      - linux
    
    goarch:
      - amd64
      - arm64
    
    # CGo-free: no dependencies on system libraries
    env:
      - CGO_ENABLED=0

archives:
  - id: pomogo-archive
    builds:
      - pomogo
    format: tar.gz
    
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}
    
    # Include contrib files in archive
    files:
      - src: contrib/
        dst: contrib/
      - src: docs/
        dst: docs/
      - src: README.md
        dst: README.md
      - src: PIPELINE.md
        dst: PIPELINE.md
    
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}-{{ .Version }}-checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ .Tag }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge"

# No publishing configured yet (use: goreleaser release --snapshot --clean)
